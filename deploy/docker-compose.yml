
version: "3.8"
# Postgres is optional; the gateway does not connect to it (engine uses DATA_DIR WAL only).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: chronos
    ports: ["5432:5432"]
    volumes: [ "pgdata:/var/lib/postgresql/data" ]

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    environment:
      RUST_LOG: info
      DATA_DIR: /data
      ADMIN_TOKEN: dev
    volumes:
      - chronosdata:/data
    ports: ["8081:8081"]
    depends_on: [postgres]

  ui:
    build: ../ui
    ports: ["5173:5173"]
    depends_on: [gateway]
    command: ["npm","run","dev","--","--host","0.0.0.0"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:10.2.3
    ports: ["3000:3000"]
    volumes:
      - ./grafana:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

volumes:
  pgdata: {}
  chronosdata: {}
